<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="sunG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>

  <rect width="600" height="340" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#e0f2fe" opacity="0.5">
    <circle cx="50" cy="30" r="1.2"/><circle cx="130" cy="20" r="1"/><circle cx="220" cy="45" r="1.5"/>
    <circle cx="310" cy="15" r="1.2"/><circle cx="420" cy="35" r="1"/><circle cx="530" cy="22" r="1.5"/>
    <circle cx="575" cy="55" r="1"/><circle cx="80" cy="60" r="1"/><circle cx="480" cy="58" r="1.2"/>
  </g>

  <!-- Sun -->
  <circle cx="480" cy="90" r="48" fill="#fde68a" opacity="0.12"/>
  <circle cx="480" cy="90" r="34" fill="url(#sunG)"/>
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="480" y1="44" x2="480" y2="34"/>
    <line x1="480" y1="136" x2="480" y2="146"/>
    <line x1="434" y1="90" x2="424" y2="90"/>
    <line x1="526" y1="90" x2="536" y2="90"/>
    <line x1="448" y1="58" x2="441" y2="51"/>
    <line x1="512" y1="122" x2="519" y2="129"/>
    <line x1="512" y1="58" x2="519" y2="51"/>
    <line x1="448" y1="122" x2="441" y2="129"/>
  </g>

  <!-- Cloud 1 (big) -->
  <g opacity="0.95">
    <ellipse cx="200" cy="130" rx="80" ry="38" fill="#e0f2fe"/>
    <ellipse cx="150" cy="145" rx="55" ry="30" fill="#e0f2fe"/>
    <ellipse cx="255" cy="145" rx="55" ry="30" fill="#e0f2fe"/>
    <ellipse cx="200" cy="158" rx="85" ry="24" fill="#e0f2fe"/>
  </g>

  <!-- Rain drops -->
  <g fill="#7dd3fc" opacity="0.7">
    <ellipse cx="155" cy="195" rx="2.5" ry="7"/>
    <ellipse cx="175" cy="208" rx="2.5" ry="7"/>
    <ellipse cx="195" cy="200" rx="2.5" ry="7"/>
    <ellipse cx="215" cy="213" rx="2.5" ry="7"/>
    <ellipse cx="235" cy="197" rx="2.5" ry="7"/>
    <ellipse cx="165" cy="220" rx="2.5" ry="6"/>
    <ellipse cx="205" cy="226" rx="2.5" ry="6"/>
    <ellipse cx="225" cy="228" rx="2.5" ry="6"/>
  </g>

  <!-- UI Card -->
  <rect x="30" y="185" width="200" height="120" rx="12" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5" opacity="0.92"/>
  <text x="130" y="210" text-anchor="middle" font-family="'Segoe UI'" font-size="11" fill="#7dd3fc">Greater Noida, IN</text>
  <text x="130" y="245" text-anchor="middle" font-family="'Segoe UI'" font-size="36" font-weight="800" fill="#ffffff">24°C</text>
  <text x="130" y="268" text-anchor="middle" font-family="'Segoe UI'" font-size="12" fill="#bae6fd">Partly Cloudy</text>
  <!-- mini stats -->
  <text x="55" y="292" font-family="monospace" font-size="9" fill="#7dd3fc">H: 71%</text>
  <text x="130" y="292" text-anchor="middle" font-family="monospace" font-size="9" fill="#7dd3fc">W: 12km/h</text>
  <text x="215" y="292" text-anchor="end" font-family="monospace" font-size="9" fill="#7dd3fc">UV: 4</text>

  <!-- 5-day forecast strip -->
  <rect x="250" y="220" width="325" height="90" rx="10" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1" opacity="0.9"/>
  <text x="413" y="240" text-anchor="middle" font-family="'Segoe UI'" font-size="10" fill="#7dd3fc" letter-spacing="1">5-DAY FORECAST</text>
  <g font-family="'Segoe UI'" font-size="10" fill="#e0f2fe" text-anchor="middle">
    <text x="283" y="263">Mon</text><text x="283" y="280">☀️</text><text x="283" y="298">26°</text>
    <text x="348" y="263">Tue</text><text x="348" y="280">🌤</text><text x="348" y="298">23°</text>
    <text x="413" y="263">Wed</text><text x="413" y="280">🌧</text><text x="413" y="298">19°</text>
    <text x="478" y="263">Thu</text><text x="478" y="280">⛅</text><text x="478" y="298">22°</text>
    <text x="543" y="263">Fri</text><text x="543" y="280">☀️</text><text x="543" y="298">28°</text>
  </g>

  <!-- Title -->
  <text x="30" y="323" font-family="'Segoe UI', Arial" font-size="18" font-weight="800" fill="#ffffff">Weather Forecast App</text>
  <text x="30" y="337" font-family="monospace" font-size="10" fill="#7dd3fc" opacity="0.8">JavaScript · Tailwind CSS · OpenWeather API</text>
</svg>
