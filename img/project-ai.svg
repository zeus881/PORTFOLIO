<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#6d28d9" stroke-width="0.4" opacity="0.15">
    <line x1="0" y1="68" x2="600" y2="68"/>
    <line x1="0" y1="136" x2="600" y2="136"/>
    <line x1="0" y1="204" x2="600" y2="204"/>
    <line x1="0" y1="272" x2="600" y2="272"/>
    <line x1="120" y1="0" x2="120" y2="340"/>
    <line x1="240" y1="0" x2="240" y2="340"/>
    <line x1="360" y1="0" x2="360" y2="340"/>
    <line x1="480" y1="0" x2="480" y2="340"/>
  </g>

  <!-- Pipeline flow -->
  <!-- Step 1: Excel -->
  <rect x="25" y="110" width="90" height="60" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="70" y="137" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">INPUT</text>
  <text x="70" y="155" text-anchor="middle" font-family="'Segoe UI'" font-size="12" font-weight="700" fill="#e2e8f0">Excel</text>
  <text x="70" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d28d9">Pandas</text>

  <!-- Arrow -->
  <line x1="118" y1="140" x2="148" y2="140" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="153,140 144,135 144,145" fill="#a855f7"/>

  <!-- Step 2: Crawler -->
  <rect x="153" y="110" width="90" height="60" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="198" y="137" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">CRAWL</text>
  <text x="198" y="155" text-anchor="middle" font-family="'Segoe UI'" font-size="12" font-weight="700" fill="#e2e8f0">Web</text>
  <text x="198" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d28d9">BeautifulSoup</text>

  <!-- Arrow -->
  <line x1="246" y1="140" x2="276" y2="140" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="281,140 272,135 272,145" fill="#a855f7"/>

  <!-- Step 3: LLM -->
  <rect x="281" y="110" width="90" height="60" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="326" y="137" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">ANALYSE</text>
  <text x="326" y="155" text-anchor="middle" font-family="'Segoe UI'" font-size="12" font-weight="700" fill="#e2e8f0">LLM</text>
  <text x="326" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7">Ollama</text>

  <!-- Arrow -->
  <line x1="374" y1="140" x2="404" y2="140" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="409,140 400,135 400,145" fill="#a855f7"/>

  <!-- Step 4: Rank -->
  <rect x="409" y="110" width="90" height="60" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="454" y="137" text-anchor="middle" font-family="monospace" font-size="10" fill="#fde68a">RANK</text>
  <text x="454" y="155" text-anchor="middle" font-family="'Segoe UI'" font-size="12" font-weight="700" fill="#e2e8f0">Score</text>
  <text x="454" y="168" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24">ICP Match</text>

  <!-- Streamlit dashboard mockup -->
  <rect x="35" y="200" width="530" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="35" y="200" width="530" height="22" rx="8" fill="#1e293b"/>
  <rect x="35" y="210" width="530" height="12" fill="#1e293b"/>
  <text x="55" y="216" font-family="monospace" font-size="10" fill="#a5b4fc">Streamlit Dashboard — Prospect Ranking</text>
  <!-- Rank rows -->
  <rect x="45" y="230" width="400" height="10" rx="3" fill="#7c3aed" opacity="0.8"/>
  <text x="460" y="239" font-family="monospace" font-size="9" fill="#fbbf24">98%</text>
  <rect x="45" y="247" width="320" height="10" rx="3" fill="#7c3aed" opacity="0.55"/>
  <text x="378" y="256" font-family="monospace" font-size="9" fill="#a5b4fc">81%</text>
  <rect x="45" y="263" width="240" height="10" rx="3" fill="#7c3aed" opacity="0.35"/>
  <text x="298" y="272" font-family="monospace" font-size="9" fill="#a5b4fc">61%</text>

  <!-- 60% badge -->
  <rect x="460" y="36" width="115" height="38" rx="8" fill="#7c3aed" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
  <text x="518" y="55" text-anchor="middle" font-family="'Segoe UI'" font-size="11" font-weight="700" fill="#c4b5fd">~60% time saved</text>
  <text x="518" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">on prospect research</text>

  <!-- Title -->
  <text x="30" y="305" font-family="'Segoe UI', Arial" font-size="18" font-weight="800" fill="#ffffff">AI-Powered Client Targeting System</text>
  <text x="30" y="325" font-family="monospace" font-size="11" fill="#a5b4fc" opacity="0.8">Python · Ollama LLM · Streamlit · Pandas · BeautifulSoup</text>
</svg>
