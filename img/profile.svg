<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </radialGradient>
    <radialGradient id="circle" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#99f6e4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <clipPath id="clip"><rect width="400" height="400" rx="24"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>

  <!-- Decorative rings -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.12"/>

  <!-- Dot pattern top-right -->
  <g opacity="0.18">
    <circle cx="340" cy="55" r="3" fill="#5eead4"/>
    <circle cx="360" cy="55" r="3" fill="#5eead4"/>
    <circle cx="380" cy="55" r="3" fill="#5eead4"/>
    <circle cx="340" cy="75" r="3" fill="#5eead4"/>
    <circle cx="360" cy="75" r="3" fill="#5eead4"/>
    <circle cx="380" cy="75" r="3" fill="#5eead4"/>
    <circle cx="340" cy="95" r="3" fill="#5eead4"/>
    <circle cx="360" cy="95" r="3" fill="#5eead4"/>
    <circle cx="380" cy="95" r="3" fill="#5eead4"/>
  </g>

  <!-- Body / shirt shape -->
  <g clip-path="url(#clip)">
    <ellipse cx="200" cy="370" rx="110" ry="70" fill="url(#body)"/>
    <rect x="90" y="300" width="220" height="100" fill="url(#body)"/>

    <!-- Collar -->
    <polygon points="200,295 170,315 200,310 230,315" fill="#0d9488"/>

    <!-- Head -->
    <ellipse cx="200" cy="210" rx="72" ry="82" fill="url(#circle)"/>

    <!-- Face shadow / shading -->
    <ellipse cx="200" cy="220" rx="60" ry="70" fill="#ccfbf1" opacity="0.15"/>

    <!-- Initials -->
    <text x="200" y="228" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
          font-size="68" font-weight="800" fill="#042f2e" letter-spacing="-2">SK</text>
  </g>

  <!-- Bottom name bar -->
  <rect x="0" y="340" width="400" height="60" fill="#042f2e" opacity="0.7"/>
  <text x="200" y="372" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="18" font-weight="700" fill="#fbbf24" letter-spacing="1">SANJAY KUMAR</text>
  <text x="200" y="392" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="400" fill="#99f6e4" letter-spacing="2">SOFTWARE ENGINEER</text>
</svg>
